version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tu_voz_segura_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres12345
      POSTGRES_DB: yihgkkrveccxmxzpqdlq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tu_voz_segura_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tu_voz_segura_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - tu_voz_segura_network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  tu_voz_segura_network:
    driver: bridge
